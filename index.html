<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyOS - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div class="login-container" id="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-brain"></i>
                <h1>StudyOS</h1>
            </div>
            <p class="login-subtitle">Sistema Inteligente de Estudos</p>
            
            <form id="login-form" onsubmit="event.preventDefault(); fazerLogin()">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Usuário" value="Carla" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Senha" value="Cacau">
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                
                <div class="login-info" id="login-error" style="display: none; color: var(--danger); margin-top: 10px;">
                    <i class="fas fa-exclamation-circle"></i> Usuário ou senha incorretos!
                </div>
            </form>
            
            <div class="login-footer">
                <p>Apenas para uso pessoal de Carla</p>
            </div>
        </div>
    </div>

    <!-- SISTEMA PRINCIPAL (INICIALMENTE OCULTO) -->
    <div class="app-container" id="app-container" style="display: none;">
        <!-- ... CONTEÚDO COMPLETO DO SISTEMA ... -->
        <!-- (Todo o código que já tínhamos antes) -->
        <!-- Vou colocar o conteúdo completo abaixo -->
    </div>

    <script>
        // Função de login simplificada (o resto do código vai no script.js)
        function fazerLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'Carla' && password === 'Cacau') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                // Inicializar o sistema após login
                if (typeof inicializarSistema === 'function') {
                    inicializarSistema();
                }
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // Permitir login com Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
