<!-- NOVO HEADER (IGUAL AO QUE VOCÊ GOSTOU) -->
<header class="studyos-header">
    <div class="header-content">
        <div class="logo">
            <h1>StudyOS</h1>
            <p>"Organize seus estudos com inteligência"</p>
        </div>
    </div>

    <!-- BOTÕES DE NAVEGAÇÃO GRANDES -->
    <div class="nav-buttons-container">
        <button class="nav-btn active" data-tab="hoje">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" fill="none"/>
                <rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" fill="none"/>
                <rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" fill="none"/>
                <rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" fill="none"/>
            </svg>
            Hoje
        </button>

        <button class="nav-btn" data-tab="notas">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M4 6H20M4 12H20M4 18H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Notas
        </button>

        <button class="nav-btn" data-tab="prazos">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M12 7V12L15 15" stroke="currentColor" stroke-width="2"/>
            </svg>
            Prazos
        </button>

        <button class="nav-btn" data-tab="calendario">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M3 10H21M8 2V6M16 2V6" stroke="currentColor" stroke-width="2"/>
            </svg>
            Calendário
        </button>

        <button class="nav-btn" data-tab="plano-aulas">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M4 4H20V20H4V4Z" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M8 8H16M8 12H16M8 16H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Planos
        </button>

        <button class="nav-btn" data-tab="progresso">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M3 17V20M10 13V20M17 9V20M21 4V20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Progresso
        </button>
    </div>

    <!-- INFO DO USUÁRIO (IGUAL AO SEU EXEMPLO) -->
    <div class="user-info-bar">
        <span class="user-name">Carla Vicktoria</span>
        <span class="user-badge student">ENG. SOFTWARE</span>
        <span class="user-badge turma">TURMA C</span>
        
        <!-- NOTIFICAÇÕES (igual ao seu exemplo) -->
        <div class="notification-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z"/>
                <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"/>
            </svg>
            <span class="notification-badge" id="notificacao-badge">3</span>
        </div>

        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
</header>

<!-- CONTEÚDO PRINCIPAL (MUDOU PARA MAIN) -->
<main class="studyos-main">
    <!-- DASHBOARD HOJE (JÁ APARECE LOGO DE CARA) -->
    <div class="dashboard-today">
        <!-- CABEÇALHO COM DATA -->
        <div class="today-header">
            <h1>Olá, Carla! 👋</h1>
            <div class="date-large" id="data-extensa"></div>
        </div>

        <!-- CARDS DE PRAZOS URGENTES (IGUAL AO SEU EXEMPLO) -->
        <div class="urgent-grid" id="urgentes-lista">
            <!-- Cards serão inseridos via JS -->
        </div>

        <!-- TIMER DE 2h30 (EM CARD) -->
        <div class="timer-card">
            <div class="timer-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 7V12L15 15"/>
                </svg>
                <h3>Meta de hoje: 2h30 de estudo</h3>
            </div>
            <div class="timer-progress-container">
                <div class="timer-progress-bar" id="timer-progresso" style="width: 0%"></div>
            </div>
            <div class="timer-buttons">
                <button class="timer-btn" onclick="iniciarTimer()">▶ Iniciar</button>
                <button class="timer-btn" onclick="pausarTimer()">⏸️ Pausar</button>
                <button class="timer-btn" onclick="zerarTimer()">⏹️ Zerar</button>
            </div>
        </div>

        <!-- GRADE DO DIA (MANHÃ = PRÉ-AULA, TARDE = AULA) -->
        <h2 class="section-title">📅 O que estudar hoje</h2>
        <div class="study-grid">
            <!-- Manhã -->
            <div class="study-card manha">
                <div class="card-header">
                    <span class="period-icon">🌅</span>
                    <h3>Manhã (Pré-aula)</h3>
                    <span class="period-time">08:00 - 12:00</span>
                </div>
                <div class="card-content" id="periodo-manha"></div>
            </div>

            <!-- Tarde -->
            <div class="study-card tarde">
                <div class="card-header">
                    <span class="period-icon">☀️</span>
                    <h3>Tarde (Aula)</h3>
                    <span class="period-time">14:00 - 18:00</span>
                </div>
                <div class="card-content" id="periodo-tarde"></div>
            </div>

            <!-- Noite -->
            <div class="study-card noite">
                <div class="card-header">
                    <span class="period-icon">🌙</span>
                    <h3>Noite (Cursos)</h3>
                    <span class="period-time">19:00 - 22:00</span>
                </div>
                <div class="card-content" id="periodo-noite"></div>
            </div>
        </div>

        <!-- SUGESTÕES DE ESTUDO (EM CARDS) -->
        <h2 class="section-title">📌 Sugestões para hoje</h2>
        <div class="suggestions-grid" id="lista-sugestoes"></div>
    </div>

    <!-- OUTRAS ABAS (CONTINUAM IGUAIS) -->
    <div class="tab-pane" id="tab-notas" style="display: none;">
        <!-- conteúdo das notas (já existente) -->
    </div>
    <!-- ... resto das abas continua igual ... -->
</main>
